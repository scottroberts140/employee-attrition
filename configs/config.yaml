# Training settings
data_url_raw: "./data/raw/WA_Fn-UseC_-HR-Employee-Attrition.CSV"
data_url_processed: "./data/processed/WA_Fn-UseC_-HR-Employee-Attrition.CSV"
target: "Attrition"
numeric_columns:
  - "Age"
  - "DailyRate"
  - "DistanceFromHome"
  - "EmployeeCount"
  - "HourlyRate"
  - "MonthlyIncome"
  - "MonthlyRate"
  - "NumCompaniesWorked"
  - "PercentSalaryHike"
  - "StandardHours"
  - "TotalWorkingYears"
  - "TrainingTimesLastYear"
  - "YearsAtCompany"
  - "YearsInCurrentRole"
  - "YearsSinceLastPromotion"
  - "YearsWithCurrManager"
categorical_columns:
  - "BusinessTravel"
  - "Department"
  - "Education"
  - "EducationField"
  - "EnvironmentSatisfaction"
  - "Gender"
  - "JobInvolvement"
  - "JobLevel"
  - "JobRole"
  - "JobSatisfaction"
  - "MaritalStatus"
  - "Over18"
  - "OverTime"
  - "PerformanceRating"
  - "RelationshipSatisfaction"
  - "StockOptionLevel"
  - "WorkLifeBalance"
default_dials:
  test_size: 0.2
  random_state: 75
  features_to_drop:
    - "EmployeeNumber"
  missing_value_strategy_numeric: "median"
  missing_value_strategy_categorical: "mode"
  min_accuracy: 0.35
  min_f1: 0.30
random_forest_dials:
  n_estimators: 100
  max_depth: 10
  additional_features_to_drop: []

