name: ML Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  train:
    name: Train and Evaluate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull DVC data
        run: dvc pull

      - name: Train selected model configuration
        run: |
          python src/experiment.py \
            --suite initial \
            --scenario initial \
            --model-file rf \
            --configuration baseline \
            --fail-on-thresholds \
            --save-local-artifacts \
            --model-output-path models/model.pkl \
            --metrics-output-path metrics/results.json

      - name: Upload metrics as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-metrics
          path: metrics/results.json
          if-no-files-found: warn

      - name: Upload model as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/model.pkl
          if-no-files-found: error
