name: ML Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure DagsHub credentials for DVC
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if [ -n "$DAGSHUB_TOKEN" ]; then
            REMOTE_NAME=$(dvc config core.remote)
            dvc remote modify --local "$REMOTE_NAME" access_key_id "$DAGSHUB_TOKEN"
            dvc remote modify --local "$REMOTE_NAME" secret_access_key "$DAGSHUB_TOKEN"
          else
            echo "DAGSHUB_TOKEN is not set."
            exit 1
          fi

      - name: Pull DVC data
        run: dvc pull

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  train:
    name: Train and Evaluate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure DagsHub credentials for DVC
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if [ -n "$DAGSHUB_TOKEN" ]; then
            REMOTE_NAME=$(dvc config core.remote)
            dvc remote modify --local "$REMOTE_NAME" access_key_id "$DAGSHUB_TOKEN"
            dvc remote modify --local "$REMOTE_NAME" secret_access_key "$DAGSHUB_TOKEN"
          else
            echo "DAGSHUB_TOKEN is not set."
            exit 1
          fi

      - name: Pull DVC data
        run: dvc pull

      - name: Train selected model configuration
        run: |
          python src/experiment.py \
            --suite initial \
            --scenario ci \
            --fail-on-thresholds

      - name: Upload metrics as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-metrics
          path: metrics/results.json
          if-no-files-found: warn

      - name: Upload model as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/model.pkl
          if-no-files-found: error
