dataset_config: "employee_attrition"

scenarios:
  initial:
    title: "Initial comparision"
    description: "Initial comparison for the employee attrition dataset."
    defaults:
      save_local_artifacts: false
    models:
      - file: "rf"
        configurations: []
      - file: "lr"
        configurations: []
      - file: "gb"
        configurations: []

  ci:
    title: "CI Validation"
    description: "Stable single-run scenario used by the GitHub Actions pipeline."
    defaults:
      save_local_artifacts: true
      local_output_paths:
        model: "models/model.pkl"
        metrics: "metrics/results.json"
    models:
      - file: "lr"
        configurations:
          - "weaker_regularization"